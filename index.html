        let currentTopic = null;

        // Convert Base64 PCM16 to WAV Blob
        function pcmToWav(pcmBase64, sampleRate = 24000) {
            const binaryString = atob(pcmBase64);
            const pcmData = new Int16Array(binaryString.length / 2);
            for (let i = 0; i < pcmData.length; i++) {
                pcmData[i] = binaryString.charCodeAt(i * 2) | (binaryString.charCodeAt(i * 2 + 1) << 8);
            }

            const numChannels = 1;
            const bitsPerSample = 16;
            const byteRate = sampleRate * numChannels * (bitsPerSample / 8);
            const blockAlign = numChannels * (bitsPerSample / 8);
            const wavBuffer = new ArrayBuffer(44 + pcmData.byteLength);
            const view = new DataView(wavBuffer);

            const writeString = (offset, string) => {
                for (let i = 0; i < string.length; i++) {
                    view.setUint8(offset + i, string.charCodeAt(i));
                }
            };

            writeString(0, 'RIFF');
            view.setUint32(4, 36 + pcmData.byteLength, true);
            writeString(8, 'WAVE');
            writeString(12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true);
            view.setUint16(22, numChannels, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, byteRate, true);
            view.setUint16(32, blockAlign, true);
            view.setUint16(34, bitsPerSample, true);
            writeString(36, 'data');
            view.setUint32(40, pcmData.byteLength, true);

            let offset = 44;
            for (let i = 0; i < pcmData.length; i++) {
                view.setInt16(offset, pcmData[i], true);
                offset += 2;
            }

            return new Blob([wavBuffer], { type: 'audio/wav' });
        }

        // Gemini TTS API Call with exponential backoff
        async function generateTTS(text, voice) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`;
            const payload = {
                contents: [{ parts: [{ text: text }] }],
                generationConfig: {
                    responseModalities: ["AUDIO"],
                    speechConfig: {
                        voiceConfig: { prebuiltVoiceConfig: { voiceName: voice } }
                    }
                },
                model: "gemini-2.5-flash-preview-tts"
            };

            let retries = 5;
            let delay = 1000;
            
            while (retries > 0) {
                try {
                    const response = await fetch(url, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(payload)
                    });
                    
                    if (!response.ok) {
                        const errText = await response.text();
                        throw new Error(`HTTP ${response.status}: ${errText}`);
                    }
                    
                    const data = await response.json();
                    const inlineData = data.candidates?.[0]?.content?.parts?.[0]?.inlineData;
                    if (!inlineData) throw new Error("API response did not contain audio data.");

                    const pcmBase64 = inlineData.data;
                    const mimeType = inlineData.mimeType || "audio/pcm;rate=24000";
                    let sampleRate = 24000;
                    const mimeMatch = mimeType.match(/rate=(\d+)/);
                    if (mimeMatch) sampleRate = parseInt(mimeMatch[1], 10);

                    return pcmToWav(pcmBase64, sampleRate);
                } catch (error) {
                    console.error(`Attempt failed. Retries left: ${retries - 1}`, error);
                    retries--;
                    if (retries === 0) throw error;
                    await new Promise(r => setTimeout(r, delay));
                    delay *= 2;
                }
            }
        }

            element.classList.add('bg-blue-50', 'border-blue-500');

            // Set Data
            if (id === 'custom') {

                currentTitle.textContent = currentTopic.title;
                currentText.value = '';
                currentText.placeholder = 'Nhập hoặc dán văn bản tiếng Anh của bạn vào đây (Ví dụ: Hello, how are you?)...';
            } else {
                currentTopic = topics.find(t => t.id === id);
                currentTitle.textContent = currentTopic.title;
                currentText.value = currentTopic.text;
                currentText.placeholder = 'Nhập văn bản tiếng Anh của bạn vào đây...';
            }
            
            // Reset Player State
            welcomeState.classList.add('hidden');
            contentState.classList.remove('hidden');
            playerContainer.classList.add('hidden');
            errorMsg.classList.add('hidden');
            audioPlayer.pause();
            if (audioBlobUrl) {
                URL.revokeObjectURL(audioBlobUrl);
                audioBlobUrl = null;
            }
        }

        generateBtn.onclick = async () => {
            const textToSpeech = currentText.value.trim();
            if (!textToSpeech) {
                errorMsg.textContent = "Vui lòng nhập nội dung văn bản trước khi tạo audio.";
                errorMsg.classList.remove('hidden');
                return;
            }
            if (isGenerating) return;
            
            isGenerating = true;
            generateBtn.disabled = true;
            generateBtn.classList.add('opacity-70', 'cursor-not-allowed');
            generateBtnText.innerHTML = '<span class="loader"></span> Đang tạo Audio...';
            playerContainer.classList.add('hidden');
            errorMsg.classList.add('hidden');
            
            if (audioBlobUrl) {
                URL.revokeObjectURL(audioBlobUrl);
            }

            try {
                const voice = voiceSelect.value;
                const wavBlob = await generateTTS(textToSpeech, voice);
                audioBlobUrl = URL.createObjectURL(wavBlob);
                
                audioPlayer.src = audioBlobUrl;
                downloadBtn.href = audioBlobUrl;
                const safeTitle = currentTopic.title.replace(/[^a-z0-9]/gi, '_').toLowerCase();
                downloadBtn.download = `Aptis_B2_C_${safeTitle}.wav`;
                
                playerContainer.classList.remove('hidden');
                playerContainer.classList.add('flex');
                audioPlayer.play();
                
            } catch (err) {
                errorMsg.textContent = "Lỗi khi tạo âm thanh. Vui lòng thử lại sau. Chi tiết: " + err.message;
                errorMsg.classList.remove('hidden');
            } finally {
                isGenerating = false;
                generateBtn.disabled = false;
                generateBtn.classList.remove('opacity-70', 'cursor-not-allowed');
                generateBtnText.textContent = 'Tạo Audio & Nghe';
            }
        };

        // Initialize
        renderTopicList();
    </script>
</body>
</html>
